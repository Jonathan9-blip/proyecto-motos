<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Motos</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
text-align:center;
}

/* TITULO NEON */

h1{
padding:20px;
color:#00ffff;
text-shadow:
0 0 5px #00ffff,
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
}

/* BUSCADOR */

#buscador{
padding:10px;
width:250px;
border-radius:5px;
border:none;
margin-bottom:10px;
}

/* FILTRO */

#filtro{
padding:10px;
border-radius:5px;
border:none;
margin-left:10px;
}

/* GALERIA */

.galeria{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

/* TARJETAS */

.moto{
width:250px;
cursor:pointer;
transition:transform 0.3s, box-shadow 0.3s;
background:#1c1c1c;
padding:10px;
border-radius:10px;
border:2px solid #00ffff;
box-shadow:0 0 10px #00ffff;
}

.moto img{
width:100%;
border-radius:10px;
}

.moto:hover{
transform:scale(1.05);
box-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-contenido{
background:#222;
padding:20px;
border-radius:10px;
width:400px;
text-align:left;
position:relative;
border:2px solid #00ffff;
box-shadow:0 0 20px #00ffff;
}

.cerrar{
position:absolute;
top:10px;
right:15px;
font-size:20px;
cursor:pointer;
}

/* BOTONES */

button{
background:transparent;
color:#00ffff;
border:2px solid #00ffff;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
box-shadow:0 0 10px #00ffff;
}

button:hover{
background:#00ffff;
color:black;
}

/* CELULAR */

@media (max-width:768px){

.galeria{
flex-direction:column;
align-items:center;
}

.moto{
width:90%;
}

.modal-contenido{
width:90%;
}

}

</style>
</head>

<body>

<h1>🏍️ Galería de Motos</h1>

<input type="text" id="buscador" placeholder="Buscar moto..." onkeyup="buscarMoto()">

<select id="filtro" onchange="filtrarCilindrada()">
<option value="todas">Todas</option>
<option value="250">200cc - 299cc</option>
<option value="300">300cc - 349cc</option>
<option value="400">350cc - 450cc</option>
</select>

<div class="galeria">

<div class="moto" data-cc="280" onclick="mostrarInfo('moto1')">
<img src="./imagenes/italika280z..jpeg">
<h3>Italika 280z</h3>
</div>

<div class="moto" data-cc="300" onclick="mostrarInfo('moto2')">

</div>

<div class="moto" data-cc="390" onclick="mostrarInfo('moto3')">
<img src="./imagenes/KTM 390.jpeg">
<h3>KTM Duke 390 ABS</h3>
</div>

<div class="moto" data-cc="400" onclick="mostrarInfo('moto4')">

</div>

<div class="moto" data-cc="300" onclick="mostrarInfo('moto5')">

<div class="moto" data-cc="250" onclick="mostrarInfo('moto6')">

<div class="moto" data-cc="250" onclick="mostrarInfo('moto7')">

</div>

<!-- MODAL -->

<div class="modal" id="modal">
<div class="modal-contenido">
<span class="cerrar" onclick="cerrarModal()">✖</span>
<div id="contenido-info"></div>

/* MOSTRAR MODAL */

function mostrarInfo(moto){
document.getElementById("contenido-info").innerHTML = datos[moto];
document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
document.getElementById("modal").style.display = "none";
}

/* BUSCADOR */

function buscarMoto(){

let input = document.getElementById("buscador").value.toLowerCase();
let motos = document.getElementsByClassName("moto");

for(let i=0;i<motos.length;i++){

let nombre = motos[i].innerText.toLowerCase();

if(nombre.includes(input)){
motos[i].style.display="block";
}else{
motos[i].style.display="none";
}

}

}

/* FILTRO */

function filtrarCilindrada(){

let filtro = document.getElementById("filtro").value;
let motos = document.getElementsByClassName("moto");

for(let i=0;i<motos.length;i++){

let cc = parseInt(motos[i].getAttribute("data-cc"));

if(filtro=="todas"){
motos[i].style.display="block";
}

else if(filtro=="250" && cc>=200 && cc<=299){
motos[i].style.display="block";
}

else if(filtro=="300" && cc>=300 && cc<=349){
motos[i].style.display="block";
}

else if(filtro=="400" && cc>=350 && cc<=450){
motos[i].style.display="block";
}

else{
motos[i].style.display="none";
}

}

}
