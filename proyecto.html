<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Motos</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
text-align:center;
}

/* TITULO NEON */

h1{
padding:20px;
color:#00ffff;
text-shadow:
0 0 5px #00ffff,
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
}

/* GALERIA */

.galeria{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

/* TARJETAS DE MOTOS */

.moto{
width:250px;
cursor:pointer;
transition:transform 0.3s, box-shadow 0.3s;
background:#1c1c1c;
padding:10px;
border-radius:10px;
border:2px solid #00ffff;
box-shadow:
0 0 5px #00ffff,
0 0 10px #00ffff;
}

.moto img{
width:100%;
border-radius:10px;
}

.moto:hover{
transform:scale(1.05);
box-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-contenido{
background:#222;
padding:20px;
border-radius:10px;
width:400px;
text-align:left;
position:relative;
border:2px solid #00ffff;
box-shadow:0 0 20px #00ffff;
}

.cerrar{
position:absolute;
top:10px;
right:15px;
font-size:20px;
cursor:pointer;
color:#00ffff;
}

/* BOTONES NEON */

button{
background:transparent;
color:#00ffff;
border:2px solid #00ffff;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
box-shadow:0 0 10px #00ffff;
transition:0.3s;
}

button:hover{
background:#00ffff;
color:black;
box-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
}

/* AJUSTE PARA CELULAR */

@media (max-width:768px){

.galeria{
flex-direction:column;
align-items:center;
}

.moto{
width:90%;
}

.modal-contenido{
width:90%;
}

}

</style>
</head>

<body>
