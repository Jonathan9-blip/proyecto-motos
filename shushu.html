<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Persona Especial ❤️</title>

    <style>
        body{
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .contenedor{
            background-color: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 420px;
            position: relative;
            animation: aparecer 1.5s ease;
        }

        @keyframes aparecer{
            from{transform: scale(0.7); opacity: 0;}
            to{transform: scale(1); opacity: 1;}
        }

        h1{
            color: #ff2e63;
            margin-bottom: 15px;
            font-size: 28px;
        }

        img{
            width: 100%;
            border-radius: 20px;
            margin-bottom: 15px;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }

        img:hover{
            transform: scale(1.05);
            box-shadow: 0px 10px 25px rgba(255,0,90,0.5);
        }

        p{
            color: #555;
            font-size: 18px;
            animation: brillo 2s infinite alternate;
        }

        @keyframes brillo{
            from{color: #555;}
            to{color: #ff2e63;}
        }

        /* Corazones flotando */
        .corazon{
            position: absolute;
            color: rgba(255,0,90,0.6);
            font-size: 20px;
            animation: flotar 6s linear infinite;
        }

        @keyframes flotar{
            0%{
                transform: translateY(100vh) scale(0.5);
                opacity: 1;
            }
            100%{
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

    </style>
</head>
<body>

    <!-- Corazones -->
    <div class="corazon" style="left:10%;">❤️</div>
    <div class="corazon" style="left:25%; animation-delay:2s;">💖</div>
    <div class="corazon" style="left:40%; animation-delay:4s;">💘</div>
    <div class="corazon" style="left:60%; animation-delay:1s;">💗</div>
    <div class="corazon" style="left:75%; animation-delay:3s;">💕</div>

    <div class="contenedor">
        <h1>Mi Chaparritaa ❤️</h1>

        <img src="./imagenes/WhatsApp Image 2026-02-18 at 9.28.42 AM.jpeg" alt="Foto especial">

        <p>Me encantasss 💖</p>
    </div>

</body>
</html>
